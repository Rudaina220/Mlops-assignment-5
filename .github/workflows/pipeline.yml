name: Mlops 5

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_URI: file:./mlruns

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc

      - name: Pull data with DVC
        run: dvc pull

      - name: Train model and log to MLflow
        run: python train.py

      - name: Verify model_info.txt exists
        run: |
          test -f model_info.txt || (echo "model_info.txt not found" && exit 1)
          echo "Run ID stored in model_info.txt:"
          cat model_info.txt

      - name: Upload model_info.txt artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

      - name: Upload mlruns artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlruns-artifact
          path: mlruns

  deploy:
    needs: validate
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_URI: file:./mlruns

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download model_info.txt
        uses: actions/download-artifact@v4
        with:
          name: model-info
          path: .

      - name: Download mlruns artifact
        uses: actions/download-artifact@v4
        with:
          name: mlruns-artifact
          path: .

      - name: Show downloaded Run ID
        run: |
          echo "Downloaded Run ID:"
          cat model_info.txt

      - name: Check threshold in MLflow
        run: python check.py

      - name: Mock Build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"

      - name: Docker build
        run: docker build --build-arg RUN_ID=$(cat model_info.txt) -t my-model:latest .
